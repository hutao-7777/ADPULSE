[tool.black]
line-length = 88
target-version = ["py311", "py312", "py313"]
include = '\.pyi?$'
extend-exclude = '''
/(
  | \\.git
  | \\venv
  | \\.pytest_cache
)/
'''

[tool.isort]
profile = "black"
line_length = 88
multi_line_output = 3
known_first_party = ["app"]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_ignores = true
ignore_missing_imports = false
exclude = [
    "venv",
    ".pytest_cache",
]

[[tool.mypy.overrides]]
module = ["scipy.*", "statsmodels.*", "openai.*", "anthropic.*", "tqdm.*"]
ignore_missing_imports = true
