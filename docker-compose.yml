version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: adpulse-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./adpulse.db
      - CORS_ORIGINS=["http://localhost:5173"]
    volumes:
      - ./backend/adpulse.db:/app/adpulse.db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: adpulse-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
