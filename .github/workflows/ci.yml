name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    env:
      SECRET_KEY: ${{ secrets.SECRET_KEY || 'ci-test-secret-key-must-be-at-least-32-characters-long' }}
      ENABLE_PUBLIC_REGISTRATION: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check formatting with black
        run: black --check app tests

      - name: Lint with flake8
        run: flake8 app tests --count

      - name: Type check with mypy
        run: mypy app tests

      - name: Run pytest
        run: |
          export PYTHONPATH=$(pwd)
          pytest tests/ -v

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start backend (in-memory DB) in background
        run: |
          cd ../backend
          pip install -r requirements.txt
          SECRET_KEY="ci-test-e2e-secret-key-must-be-32-characters" \
          ENABLE_PUBLIC_REGISTRATION="true" \
          DATABASE_URL="sqlite+aiosqlite:///:memory:" \
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          timeout 30 bash -c 'while ! curl -s http://localhost:8000/health > /dev/null 2>&1; do sleep 1; done'

      - name: Start frontend dev server
        run: |
          VITE_API_URL=http://localhost:8000 npx vite --port 5173 &
          timeout 30 bash -c 'while ! curl -s http://localhost:5173 > /dev/null 2>&1; do sleep 1; done'

      - name: Run Playwright E2E tests
        run: npx playwright test --reporter=html

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
